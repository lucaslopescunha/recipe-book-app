<div class="row">
  <div class="col-xs-12">
    <button class="btn btn-success" (click)="onNewRecipe()">New Recipe</button>
  </div>
</div>
<hr>
<div class="row">
  <div class="col-xs-12">
    @for(recipe of recipes(); track recipe.id; let i = $index, e = $even) {
        <app-recipe-item 
            [recipe]="recipe" 
            [even]="e"
            [index]="i"></app-recipe-item>
    }
  </div>
</div>
